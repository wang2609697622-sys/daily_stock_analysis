name: WebUI Pages

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Optional deployed API base URL, for example https://api.example.com'
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: webui-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build WebUI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dsa-web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/dsa-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/app/
          VITE_API_URL: ${{ github.event.inputs.api_base_url || vars.WEBUI_API_URL || '' }}

      - name: Build Pages site
        run: python ../../.github/scripts/build_pages_site.py --output ../../pages-site --app ../../static

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages-site

  deploy:
    name: Deploy WebUI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
